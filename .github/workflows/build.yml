name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Python dependencies
        run: pip install flet==0.27.6 numpy matplotlib cookiecutter==1.7.3

      - name: Write patch files
        run: python write_patches.py

      - name: Find exact source of encoding error
        run: |
          python -c "
          import site, os
          site_dir = site.getsitepackages()[0]
          cc_dir = os.path.join(site_dir, 'cookiecutter')
          print('=== cookiecutter files ===')
          for f in sorted(os.listdir(cc_dir)):
              if f.endswith('.py'):
                  path = os.path.join(cc_dir, f)
                  with open(path) as fp:
                      content = fp.read()
                  if 'encoding' in content and 'str(' in content:
                      for i, line in enumerate(content.splitlines(), 1):
                          if 'str(' in line and 'encoding' in line:
                              print(f'{f}:{i}: {line.strip()}')
          "

      - name: Build APK
        run: |
          export PYTHONIOENCODING=utf-8
          flet build apk --no-rich-output

      - uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: build/apk/*.apk
