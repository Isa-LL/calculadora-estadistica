name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: stable

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Install Python dependencies
        run: pip install flet==0.27.6 numpy matplotlib cookiecutter==1.7.3

      - name: Patch unicode bug and delete pyc cache
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          # Patch .py files in flet_cli and cookiecutter only
          for dir in "$SITE/flet_cli" "$SITE/cookiecutter"; do
            if [ -d "$dir" ]; then
              grep -rl "\bunicode\b" "$dir" 2>/dev/null | while read f; do
                sed -i 's/isinstance(\(.*\), unicode)/isinstance(\1, str)/g' "$f"
                sed -i 's/(unicode,/(str,/g' "$f"
                sed -i 's/, unicode)/, str)/g' "$f"
                sed -i 's/\bunicode(/str(/g' "$f"
                echo "Patched py: $f"
              done
              # Delete all .pyc files so Python recompiles from patched .py
              find "$dir" -name "*.pyc" -delete
              echo "Deleted pyc cache in $dir"
            fi
          done

      - name: Create cookiecutter_extensions
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          cat > "$SITE/cookiecutter_extensions.py" << 'EOF'
          from jinja2.ext import Extension
          class FletExtension(Extension):
              def __init__(self, environment):
                  super().__init__(environment)
                  environment.filters["to_cmake_list"] = lambda v: ";".join(v) if v else ""
                  environment.filters["to_android_dependencies"] = lambda v: "" if not v else "\n".join([f"    implementation '{d}'" for d in v])
                  environment.filters["to_plist_array"] = lambda v: "" if not v else "\n".join([f"    <string>{i}</string>" for i in v])
                  environment.globals["get_pyproject"] = lambda *a, **kw: {}
                  environment.filters["get_pyproject"] = lambda v, *a, **kw: {}
                  environment.globals["to_toml"] = lambda v: ""
                  environment.filters["to_toml"] = lambda v: ""
          EOF
          echo "Created: $SITE/cookiecutter_extensions.py"

      - name: Find unicode in pyc files
        run: |
          SITE=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "Searching for unicode in .pyc files..."
          find "$SITE" -name "*.pyc" | while read f; do
            if strings "$f" 2>/dev/null | grep -q "^unicode$"; then
              echo "FOUND unicode in: $f"
            fi
          done

      - name: Build APK
        run: |
          export PYTHONIOENCODING=utf-8
          flet build apk --no-rich-output

      - uses: actions/upload-artifact@v4
        with:
          name: calculadora-apk
          path: build/apk/*.apk
